# Sample workflow for building and deploying a Next.js site to GitHub Pages
#
# To get started with Next.js see: https://nextjs.org/docs/getting-started
#
name: Deploy Next.js site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Enable Corepack & pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build with Next.js
        run: |
          pnpm run build
          mkdir -p out
          cp -r public/* out/ || true
          mkdir -p out/_next/static
          cp -r .next/static/* out/_next/static/ || true
          # The main page is inside the (frontend) route group
          cp -r .next/server/app/\(frontend\)/* out/ || true
          # Then copy the rest in case
          cp -rn .next/server/app/* out/ || true
          # Rename root page.html to index.html
          if [ -f "out/page.html" ]; then
            mv out/page.html out/index.html
          fi
          if [ -f "out/page" ]; then
            mv out/page out/index.html
          fi
          # Rename any other .html files
          find out -name "*.html" -exec sh -c 'mv "$0" "${0%.html}"' {} \; || true
          # Rename index to avoid it being dropped by the find command if already renamed
          if [ -f "out/index" ]; then mv out/index out/index.html; fi
        env:
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET || 'dummy-secret-for-build' }}
          DATABASE_URI: 'mongodb://127.0.0.1/payload-build-db'
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

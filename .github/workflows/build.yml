name: Build and Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate Types
        run: pnpm run generate:types
        env:
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET || 'dummy_secret_for_build_only' }}
          SQLITE_URL: file:./payload_build.db
          NODE_OPTIONS: "--no-deprecation"

      - name: Build
        run: pnpm run build
        env:
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET || 'dummy_secret_for_build_only' }}
          SQLITE_URL: file:./payload_build.db
          SERVER_URL: ${{ secrets.SERVER_URL || 'http://localhost:3000' }}
          NEXT_TELEMETRY_DISABLED: 1
          NODE_OPTIONS: "--no-deprecation --max-old-space-size=4096"
